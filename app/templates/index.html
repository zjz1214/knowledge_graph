<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱 + 复习系统</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #fff; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #1a1a2e; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .graph-container { flex: 1; position: relative; }
        .chat-container { height: 300px; background: #1a1a2e; border-top: 1px solid #333; padding: 20px; }
        .section-title { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card-item { background: #252540; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .card-item:hover { background: #353560; transform: translateX(4px); }
        .card-item h4 { font-size: 14px; margin-bottom: 6px; color: #fff; }
        .card-item .meta { font-size: 11px; color: #888; }
        .card-item .tags { display: flex; gap: 4px; margin-top: 6px; }
        .tag { background: #4a4a6a; padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #252540; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-box .value { font-size: 28px; font-weight: bold; color: #6c5ce7; }
        .stat-box .label { font-size: 11px; color: #888; margin-top: 4px; }
        .search-box { margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 12px 16px; background: #252540; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        .search-box input:focus { border-color: #6c5ce7; }
        .node { cursor: pointer; }
        .node circle { stroke: #fff; stroke-width: 2px; transition: all 0.3s; }
        .node:hover circle { stroke: #6c5ce7; stroke-width: 3px; }
        .node text { fill: #fff; font-size: 10px; pointer-events: none; }
        .link { stroke: #444; stroke-opacity: 0.6; }
        .chat-messages { height: 180px; overflow-y: auto; margin-bottom: 12px; }
        .chat-message { margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
        .chat-message.user { background: #4a4a6a; margin-left: 20%; }
        .chat-message.ai { background: #252540; margin-right: 20%; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px 14px; background: #252540; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; }
        .chat-input button { padding: 10px 20px; background: #6c5ce7; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 500; }
        .chat-input button:hover { background: #5a4cd7; }
        .tooltip { position: absolute; background: #252540; padding: 10px 14px; border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 100; max-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .loading { color: #888; font-size: 13px; }
        .zoom-controls { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        .zoom-btn { width: 32px; height: 32px; background: #252540; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .zoom-btn:hover { background: #353560; }
        .zoom-info { position: absolute; bottom: 10px; right: 10px; background: #252540; padding: 6px 10px; border-radius: 4px; font-size: 11px; color: #888; }
        .entity-panel { position: absolute; left: 10px; top: 10px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; max-width: 280px; max-height: 400px; overflow-y: auto; z-index: 10; }
        .entity-panel-header { padding: 12px; border-bottom: 1px solid #333; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .entity-panel-header span { font-size: 12px; color: #888; }
        .entity-panel-close { cursor: pointer; padding: 4px 8px; background: #333; border-radius: 4px; font-size: 11px; }
        .entity-list { padding: 8px; }
        .entity-item { padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 12px; }
        .entity-item:hover { background: #252540; }
        .entity-item-name { font-weight: 500; margin-bottom: 2px; }
        .entity-item-type { font-size: 10px; color: #888; }
        .category-filter { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
        .filter-btn { padding: 8px 16px; background: #252540; border: 1px solid #444; border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { background: #353560; }
        .filter-btn.active { background: #6c5ce7; border-color: #6c5ce7; }
        .filter-btn.finance.active { background: #00b894; border-color: #00b894; }
        .filter-btn.tech.active { background: #fd79a8; border-color: #fd79a8; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab-btn { flex: 1; padding: 10px; background: #252540; border: none; border-radius: 8px; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background: #353560; }
        .tab-btn.active { background: #6c5ce7; color: #fff; }
        .deep-review-panel { display: none; }
        .deep-review-panel.active { display: block; }
        .review-entity { background: #252540; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .review-entity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .review-entity-title { font-size: 16px; font-weight: 500; color: #fff; }
        .review-entity-score { font-size: 12px; color: #6c5ce7; background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .review-entity-desc { font-size: 13px; color: #888; margin-bottom: 12px; }
        .challenge-question { background: #1a1a2e; border-left: 3px solid #6c5ce7; padding: 12px; margin-bottom: 8px; border-radius: 0 6px 6px 0; }
        .challenge-question.connection { border-left-color: #00b894; }
        .challenge-question.principle { border-left-color: #fd79a8; }
        .question-type { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-right: 8px; }
        .question-type.distinction { background: #6c5ce7; color: #fff; }
        .question-type.connection { background: #00b894; color: #fff; }
        .question-type.principle { background: #fd79a8; color: #fff; }
        .answer-input { width: 100%; min-height: 80px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #fff; padding: 12px; font-size: 13px; resize: vertical; margin-top: 8px; }
        .answer-input:focus { border-color: #6c5ce7; outline: none; }
        .submit-answer { width: 100%; padding: 10px; background: #6c5ce7; border: none; border-radius: 6px; color: #fff; font-size: 13px; cursor: pointer; margin-top: 8px; }
        .submit-answer:hover { background: #5a4cd7; }
        .feedback-panel { background: #1a1a2e; border-radius: 8px; padding: 16px; margin-top: 12px; }
        .feedback-score { font-size: 24px; font-weight: bold; color: #6c5ce7; margin-bottom: 12px; }
        .feedback-item { background: #252540; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
        .feedback-item .type { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-right: 8px; }
        .feedback-item .type.gap { background: #e17055; color: #fff; }
        .feedback-item .type.misconception { background: #fdcb6e; color: #000; }
        .feedback-item .type.superficial { background: #74b9ff; color: #fff; }
        .feedback-item .point { font-size: 13px; margin: 8px 0; }
        .feedback-item .question { font-size: 12px; color: #00b894; font-style: italic; }
        .prereq-tag { display: inline-block; background: #00b894; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
        .sibling-tag { display: inline-block; background: #fd79a8; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="section-title">深度理解测试</div>
            <div id="deepReviewPanel" class="deep-review-panel active">
                <div id="deepReviewList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="graph-container" id="graphContainer">
                <svg id="graph"></svg>
                <div class="category-filter">
                    <button class="filter-btn active" onclick="setCategory(null)">全部</button>
                    <button class="filter-btn finance" onclick="setCategory('finance')">金融 💰</button>
                    <button class="filter-btn tech" onclick="setCategory('tech')">技术 🤖</button>
                </div>
                <div class="entity-panel" id="entityPanel" style="display:none;">
                    <div class="entity-panel-header">
                        <span>实体列表 (<span id="entityCount">0</span>)</span>
                        <span class="entity-panel-close" onclick="hideEntityPanel()">X</span>
                    </div>
                    <div class="entity-list" id="entityList"></div>
                </div>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <button class="zoom-btn" onclick="zoomOut()">−</button>
                    <button class="zoom-btn" onclick="resetZoom()">↺</button>
                </div>
                <div class="zoom-info" id="zoomInfo">滚轮缩放 | 拖拽平移 | 双击节点聚焦</div>
            </div>
            <div class="chat-container">
                <div class="section-title">💬 GraphRAG 搜索</div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message ai">你好！可以问我关于知识图谱的问题，比如"什么是RAG？"或"Agent是什么？"</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip" style="display:none;"></div>

    <script>
        const API_BASE = '';
        let nodes = [], links = [];
        let currentTransform = d3.zoomIdentity;

        // Load initial data
        async function init() {
            await loadGraph();
            await loadDeepReviewQueue();
        }

        let currentCategory = null;

        async function loadGraph() {
            try {
                let url = `${API_BASE}/search/graph/sample?limit=200`;
                if (currentCategory) {
                    url += `&category=${currentCategory}`;
                }
                const res = await fetch(url);
                const data = await res.json();
                visualizeGraph(data);
            } catch (e) {
                console.error(e);
                visualizeGraph(await generateSampleGraph());
            }
        }

        function setCategory(cat) {
            currentCategory = cat;
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (cat === 'finance') {
                document.querySelector('.filter-btn.finance').classList.add('active');
            } else if (cat === 'tech') {
                document.querySelector('.filter-btn.tech').classList.add('active');
            } else {
                document.querySelector('.filter-btn').classList.add('active');
            }
            loadGraph();
        }

        async function generateSampleGraph() {
            // Fetch top entities with their relationships
            const res = await fetch(`${API_BASE}/db/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: `MATCH (e:Entity)-[r]-(e2) WHERE size(e.label) > 2 RETURN e.id, e.label, e.type, collect({id: e2.id, label: e2.label}) as neighbors LIMIT 50`
                })
            }).catch(() => null);

            if (res && res.ok) {
                const data = await res.json();
                if (data.nodes && data.nodes.length > 0) {
                    return data;
                }
            }

            // Return mock data for visualization
            return {
                nodes: [
                    { id: 'llm', label: 'LLM', type: 'concept' },
                    { id: 'rag', label: 'RAG', type: 'technique' },
                    { id: 'agent', label: 'Agent', type: 'concept' },
                    { id: 'notion', label: 'Notion', type: 'organization' },
                    { id: 'transformer', label: 'Transformer', type: 'concept' }
                ],
                links: [
                    { source: 'llm', target: 'transformer' },
                    { source: 'rag', target: 'llm' },
                    { source: 'agent', target: 'llm' },
                    { source: 'agent', target: 'rag' }
                ]
            };
        }

        function visualizeGraph(data) {
            const container = document.getElementById('graphContainer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            const svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            svg.selectAll('*').remove();

            // Create zoom behavior
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    currentTransform = event.transform;
                    g.attr('transform', event.transform);
                    updateZoomInfo();
                });

            svg.call(zoom);

            // Container group for zoom/pan
            const g = svg.append('g');

            // Store for later use
            svgInstance = svg;
            zoomInstance = zoom;
            window.graphData = data;

            // Create force simulation
            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-200))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));

            // Draw links
            const link = g.append('g')
                .selectAll('line')
                .data(data.links)
                .enter().append('line')
                .attr('class', 'link')
                .attr('stroke-width', 2);

            // Draw nodes
            const node = g.append('g')
                .selectAll('g')
                .data(data.nodes)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            // Node colors by type
            const colorMap = {
                concept: '#6c5ce7',
                technique: '#00b894',
                tool: '#fd79a8',
                person: '#fdcb6e',
                organization: '#74b9ff'
            };

            node.append('circle')
                .attr('r', d => d.label ? 12 : 6)
                .attr('fill', d => colorMap[d.type] || '#888');

            node.append('text')
                .attr('dx', 16)
                .attr('dy', 4)
                .text(d => d.label || '');

            // Tooltip
            node.on('mouseover', (event, d) => {
                const tooltip = document.getElementById('tooltip');
                tooltip.style.display = 'block';
                tooltip.innerHTML = `<strong>${d.label || d.id}</strong><br>类型: ${d.type || 'unknown'}`;
                tooltip.style.left = (event.pageX + 10) + 'px';
                tooltip.style.top = (event.pageY + 10) + 'px';
            }).on('mouseout', () => {
                document.getElementById('tooltip').style.display = 'none';
            }).on('click', (event, d) => {
                event.stopPropagation();
                showEntityDetails(d.id, d.label, d.type);
            }).on('dblclick', (event, d) => {
                event.stopPropagation();
                // Focus on node
                const scale = 1.5;
                const x = width / 2 - d.x * scale;
                const y = height / 2 - d.y * scale;
                svg.transition().duration(500).call(
                    zoom.transform,
                    d3.zoomIdentity.translate(x, y).scale(scale)
                );
            });

            // Update positions
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            // Initial centering
            svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1));
        }

        function updateZoomInfo() {
            const info = document.getElementById('zoomInfo');
            const scale = Math.round(currentTransform.k * 100);
            info.textContent = `缩放: ${scale}% | 滚轮缩放 | 拖拽平移 | 双击节点聚焦`;
        }

        function zoomIn() {
            const svg = d3.select('#graph');
            svg.transition().duration(300).call(
                d3.zoom().transform,
                currentTransform.scale(1.3)
            );
        }

        function zoomOut() {
            const svg = d3.select('#graph');
            svg.transition().duration(300).call(
                d3.zoom().transform,
                currentTransform.scale(0.7)
            );
        }

        function resetZoom() {
            const svg = d3.select('#graph');
            svg.transition().duration(500).call(
                d3.zoom().transform,
                d3.zoomIdentity
            );
        }

        async function showEntityDetails(entityId, label, type) {
            try {
                const res = await fetch(`${API_BASE}/entity/${entityId}`);
                const data = await res.json();

                const entity = data.entity || {};
                const neighbors = data.neighbors || [];
                const chunks = data.chunks || [];

                // 创建详情面板
                const panel = document.createElement('div');
                panel.id = 'entityDetailPanel';
                panel.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:1px solid #444;border-radius:12px;padding:20px;z-index:1000;min-width:400px;max-width:500px;max-height:70vh;overflow-y:auto;';

                panel.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <h3 style="margin:0;color:#fff;">${escapeHtml(entity.label || label)}</h3>
                        <button onclick="closeEntityPanel()" style="background:#333;border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">X</button>
                    </div>
                    <div style="font-size:12px;color:#888;margin-bottom:12px;">
                        <span style="background:#252540;padding:2px 8px;border-radius:4px;margin-right:8px;">${entity.type || type}</span>
                        ${entity.category ? `<span style="background:#6c5ce7;padding:2px 8px;border-radius:4px;">${entity.category === 'finance' ? '金融' : '技术'}</span>` : ''}
                    </div>
                    ${entity.description ? `<p style="font-size:13px;color:#ccc;margin-bottom:16px;">${escapeHtml(entity.description)}</p>` : ''}
                    <div style="margin-bottom:16px;">
                        <div style="font-size:12px;color:#888;margin-bottom:8px;">邻居节点 (${neighbors.length})</div>
                        <div style="max-height:120px;overflow-y:auto;">
                            ${neighbors.slice(0, 15).map(n => `
                                <div style="font-size:12px;padding:4px 8px;background:#252540;border-radius:4px;margin-bottom:4px;cursor:pointer;" onclick="focusOnNode('${n.id}')">
                                    ${escapeHtml(n.label)} <span style="color:#666">(${n.rel_type})</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ${chunks.length > 0 ? `
                    <div style="margin-bottom:16px;">
                        <div style="font-size:12px;color:#888;margin-bottom:8px;">来源片段</div>
                        <div style="max-height:100px;overflow-y:auto;font-size:11px;color:#666;">
                            ${chunks.map(c => `<div style="margin-bottom:6px;padding:6px;background:#252540;border-radius:4px;">"${escapeHtml(c.preview)}..."</div>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                    <div style="display:flex;gap:8px;margin-top:16px;">
                        <button onclick="favoriteEntityNode('${entityId}')" style="flex:1;padding:10px;background:#00b894;border:none;border-radius:6px;color:#fff;cursor:pointer;">⭐ 收藏</button>
                        <button onclick="deleteEntityNode('${entityId}')" style="flex:1;padding:10px;background:#e17055;border:none;border-radius:6px;color:#fff;cursor:pointer;">🗑 删除</button>
                        <button onclick="startDeepReview('${entityId}')" style="flex:1;padding:10px;background:#6c5ce7;border:none;border-radius:6px;color:#fff;cursor:pointer;">🎯 深度复习</button>
                    </div>
                `;

                // 关闭现有面板
                closeEntityPanel();
                document.body.appendChild(panel);

                // 点击外部关闭
                setTimeout(() => {
                    document.addEventListener('click', function closePanel(e) {
                        if (!panel.contains(e.target) && e.target.id !== 'entityDetailPanel') {
                            closeEntityPanel();
                            document.removeEventListener('click', closePanel);
                        }
                    });
                }, 100);

            } catch (e) {
                alert('无法加载实体详情: ' + entityId);
            }
        }

        function closeEntityPanel() {
            const existing = document.getElementById('entityDetailPanel');
            if (existing) existing.remove();
        }

        async function deleteEntityNode(entityId) {
            if (!confirm('确定删除该实体吗？相关复习内容也会被删除。')) return;
            try {
                const res = await fetch(`${API_BASE}/deep-review/entity/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_id: entityId })
                });
                const data = await res.json();
                if (data.success) {
                    alert('删除成功');
                    closeEntityPanel();
                    loadGraph();
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('删除失败: ' + e);
            }
        }

        async function favoriteEntityNode(entityId) {
            try {
                await fetch(`${API_BASE}/deep-review/entity/favorite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_id: entityId })
                });
                alert('已收藏该实体');
            } catch (e) {
                alert('收藏失败: ' + e);
            }
        }

        async function startDeepReview(entityId) {
            closeEntityPanel();
            switchTab('deep');
            // 切换到深度复习标签并加载
            document.getElementById('deepCategorySelect').value = '';
            currentDeepCategory = '';
            loadDeepReviewQueue();
        }

        function focusOnNode(nodeId) {
            focusNode(nodeId);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="chat-message user">${escapeHtml(message)}</div>`;
            input.value = '';

            // Send to RAG
            messages.innerHTML += `<div class="chat-message ai loading">思考中...</div>`;

            try {
                const res = await fetch(`${API_BASE}/search/rag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: message, mode: 'global' })
                });
                const data = await res.json();

                // Replace loading message
                const loadingEl = messages.querySelector('.loading');
                if (loadingEl) loadingEl.remove();

                messages.innerHTML += `<div class="chat-message ai">${escapeHtml(data.answer || '无法生成回答')}</div>`;
                messages.scrollTop = messages.scrollHeight;
            } catch (e) {
                const loadingEl = messages.querySelector('.loading');
                if (loadingEl) loadingEl.remove();
                messages.innerHTML += `<div class="chat-message ai">错误: 无法连接到服务器</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showEntityPanel() {
            const panel = document.getElementById('entityPanel');
            panel.style.display = 'block';
            loadEntityList();
        }

        async function loadEntityList() {
            try {
                const res = await fetch(`${API_BASE}/search/graph/sample?limit=200`);
                const data = await res.json();
                const list = document.getElementById('entityList');
                document.getElementById('entityCount').textContent = data.nodes?.length || 0;

                if (data.nodes && data.nodes.length > 0) {
                    const colorMap = {
                        concept: '#6c5ce7',
                        technique: '#00b894',
                        tool: '#fd79a8',
                        person: '#fdcb6e',
                        organization: '#74b9ff',
                        method: '#a29bfe',
                        metric: '#55a3ff'
                    };
                    list.innerHTML = data.nodes.map(n => `
                        <div class="entity-item" onclick="focusNode('${n.id}')" style="border-left: 3px solid ${colorMap[n.type] || '#888'}">
                            <div class="entity-item-name">${escapeHtml(n.label || n.id)}</div>
                            <div class="entity-item-type">${n.type || 'concept'}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function hideEntityPanel() {
            document.getElementById('entityPanel').style.display = 'none';
        }

        // Deep Review Functions
        let currentDeepReviewSession = null;
        let currentDeepCategory = null;

        function switchTab(tab) {
            // 只保留深度复习
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('deepReviewPanel').classList.add('active');
            loadDeepReviewQueue();
        }

        async function loadDeepReviewQueue() {
            const list = document.getElementById('deepReviewList');
            list.innerHTML = '<div class="loading">加载深度复习队列...</div>';

            try {
                const res = await fetch(`${API_BASE}/deep-review/session?category=${currentDeepCategory || ''}&limit=15`);
                const data = await res.json();
                const entities = data.entities || [];

                if (entities.length === 0) {
                    list.innerHTML = `
                        <div class="loading">暂无深度复习内容</div>
                        <button onclick="triggerGeneration()" style="width:100%;padding:12px;background:#6c5ce7;border:none;border-radius:6px;color:#fff;cursor:pointer;margin-top:12px;">
                            📚 手动生成复习内容
                        </button>
                    `;
                    return;
                }

                currentDeepReviewSession = entities;

                list.innerHTML = `
                    <div style="margin-bottom: 12px; display: flex; gap: 8px;">
                        <select id="deepCategorySelect" onchange="changeDeepCategory(this.value)" style="flex:1;padding:8px;background:#252540;border:1px solid #333;border-radius:6px;color:#fff;font-size:12px;">
                            <option value="">全部</option>
                            <option value="finance" ${currentDeepCategory === 'finance' ? 'selected' : ''}>金融 💰</option>
                            <option value="tech" ${currentDeepCategory === 'tech' ? 'selected' : ''}>技术 🤖</option>
                        </select>
                        <button onclick="triggerGeneration()" style="padding:8px 12px;background:#00b894;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px;">🔄</button>
                    </div>
                    ${entities.map((e, i) => `
                        <div class="review-entity" onclick="showDeepReviewEntity(${i})">
                            <div class="review-entity-header">
                                <span class="review-entity-title">${escapeHtml(e.entity_label || e.entity_id)}</span>
                                <button onclick="event.stopPropagation();deleteEntity('${e.entity_id}')" style="padding:2px 6px;background:#252540;border:1px solid #444;border-radius:3px;color:#e17055;cursor:pointer;font-size:10px;margin-left:4px;" title="删除节点">🗑</button>
                                <span class="review-entity-score">⭐ ${e.importance_score || 0}</span>
                            </div>
                            <div class="review-entity-desc">${escapeHtml(e.entity_description || '暂无描述')}</div>
                            <div style="margin-top: 8px;">
                                ${(e.prerequisites || []).slice(0, 3).map(p => `<span class="prereq-tag">前: ${escapeHtml(p.label || '')}</span>`).join('')}
                                ${(e.siblings || []).slice(0, 3).map(s => `<span class="sibling-tag">兄: ${escapeHtml(s.label || '')}</span>`).join('')}
                            </div>
                            <div style="margin-top: 8px; display: flex; gap: 4px;">
                                <button onclick="event.stopPropagation();toggleFavorite(${i})" style="padding:4px 8px;background:#252540;border:1px solid #444;border-radius:4px;color:${e.is_favorited ? '#fdcb6e' : '#888'};cursor:pointer;font-size:11px;">${e.is_favorited ? '⭐' : '☆'}</button>
                                <button onclick="event.stopPropagation();showHistoryModal(${i})" style="padding:4px 8px;background:#252540;border:1px solid #444;border-radius:4px;color:#74b9ff;cursor:pointer;font-size:11px;">📜</button>
                                <button onclick="event.stopPropagation();regenerateReview(${i})" style="padding:4px 8px;background:#252540;border:1px solid #444;border-radius:4px;color:#a29bfe;cursor:pointer;font-size:11px;">🔄</button>
                                <button onclick="event.stopPropagation();keepReview(${i})" style="padding:4px 8px;background:#252540;border:1px solid #444;border-radius:4px;color:#00b894;cursor:pointer;font-size:11px;">✅</button>
                                <button onclick="event.stopPropagation();discardReview(${i})" style="padding:4px 8px;background:#252540;border:1px solid #444;border-radius:4px;color:#e17055;cursor:pointer;font-size:11px;">❌</button>
                                <span style="margin-left:auto;font-size:11px;color:#888;">${(e.questions || []).length} 题 · ${e.review_count || 0} 复习</span>
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (e) {
                console.error(e);
                list.innerHTML = '<div class="loading">加载失败</div>';
            }
        }

        async function triggerGeneration() {
            const list = document.getElementById('deepReviewList');
            list.innerHTML = '<div class="loading">正在生成复习内容，请稍候...</div>';

            try {
                const res = await fetch(`${API_BASE}/deep-review/generate?category=${currentDeepCategory || ''}&count=20`);
                const data = await res.json();
                // 重新加载
                await loadDeepReviewQueue();
            } catch (e) {
                list.innerHTML = '<div class="loading">生成失败: ' + e + '</div>';
            }
        }

        async function toggleFavorite(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;

            try {
                const res = await fetch(`${API_BASE}/deep-review/favorite/${entity.id}`, { method: 'POST' });
                const data = await res.json();
                entity.is_favorited = data.is_favorited;
                await loadDeepReviewQueue();
            } catch (e) {
                console.error(e);
            }
        }

        async function keepReview(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;
            if (!confirm('确定保留该卡片？保留后将从队列中移除。')) return;
            try {
                await fetch(`${API_BASE}/deep-review/keep/${entity.id}`, { method: 'POST' });
                await loadDeepReviewQueue();
            } catch (e) { console.error(e); }
        }

        async function discardReview(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;
            if (!confirm('确定丢弃该卡片？')) return;
            try {
                await fetch(`${API_BASE}/deep-review/discard/${entity.id}`, { method: 'POST' });
                await loadDeepReviewQueue();
            } catch (e) { console.error(e); }
        }

        async function regenerateReview(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;
            const force = confirm('是否强制重新生成（忽略描述是否变化）？\n\n[确定] = 强制重新生成\n[取消] = 仅当描述变化时重新生成');
            try {
                const res = await fetch(`${API_BASE}/deep-review/${entity.id}/regenerate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force: force })
                });
                const data = await res.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    alert('重新生成成功！');
                    await loadDeepReviewQueue();
                }
            } catch (e) { console.error(e); }
        }

        async function deleteEntity(entityId) {
            if (!confirm('确定删除该概念节点？\n这将同时删除该节点的所有复习卡片，且不可恢复。')) return;
            try {
                await fetch(`${API_BASE}/deep-review/entity/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_id: entityId })
                });
                await loadDeepReviewQueue();
            } catch (e) { console.error(e); }
        }

        async function showHistoryModal(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;
            try {
                const res = await fetch(`${API_BASE}/deep-review/${entity.id}/history`);
                const data = await res.json();
                const history = data.history || [];

                if (history.length === 0) {
                    alert('暂无复习历史');
                    return;
                }

                const historyHtml = history.map(h => `
                    <div style="margin-bottom:16px;padding:12px;background:#252540;border-radius:6px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                            <span style="color:#74b9ff;">问题 ${h.question_index + 1}</span>
                            <span style="color:${h.score >= 7 ? '#00b894' : h.score >= 4 ? '#fdcb6e' : '#e17055'};">${h.score}/10</span>
                        </div>
                        <div style="font-size:12px;color:#ccc;margin-bottom:4px;">你的回答：${escapeHtml(h.user_answer || '')}</div>
                        <div style="font-size:12px;color:#888;">反馈：${escapeHtml(h.feedback_summary || '')}</div>
                        <div style="font-size:11px;color:#555;margin-top:4px;">${h.created_at ? new Date(h.created_at).toLocaleString() : ''}</div>
                    </div>
                `).join('');

                const panel = document.getElementById('deepReviewList');
                panel.innerHTML = `
                    <div onclick="loadDeepReviewQueue()" style="cursor:pointer;margin-bottom:12px;color:#6c5ce7;">← 返回队列</div>
                    <div style="font-size:13px;color:#888;margin-bottom:12px;">📜 复习历史（共 ${history.length} 条）</div>
                    ${historyHtml}
                `;
            } catch (e) { console.error(e); alert('加载历史失败'); }
        }

        function changeDeepCategory(cat) {
            currentDeepCategory = cat;
            loadDeepReviewQueue();
        }

        function showDeepReviewEntity(index) {
            const entity = currentDeepReviewSession[index];
            if (!entity) return;

            const questions = entity.questions || [];
            if (questions.length === 0) {
                alert('该内容暂无问题，请选择其他实体');
                return;
            }

            const questionsHtml = questions.map((q, i) => {
                const qType = q.type || 'distinction';
                const typeLabel = qType.includes('connection') ? '联系' : qType.includes('principle') ? '原理' : '区别';
                return `
                    <div class="challenge-question ${qType.includes('connection') ? 'connection' : qType.includes('principle') ? 'principle' : ''}">
                        <div style="margin-bottom: 8px;">
                            <span class="question-type ${qType.includes('connection') ? 'connection' : qType.includes('principle') ? 'principle' : 'distinction'}">${typeLabel}</span>
                            <strong>${escapeHtml(q.question || '')}</strong>
                        </div>
                        <textarea id="answer_${index}_${i}" class="answer-input" placeholder="输入你的理解..."></textarea>
                        <button class="submit-answer" onclick="submitDeepAnswer(${index}, ${i}, '${escapeHtml(q.question || '').replace(/'/g, "\\'")}')">提交反馈</button>
                        <div id="feedback_${index}_${i}" style="display:none;"></div>
                    </div>
                `;
            }).join('');

            const panel = document.getElementById('deepReviewList');
            panel.innerHTML = `
                <div onclick="loadDeepReviewQueue()" style="cursor:pointer;margin-bottom:12px;color:#6c5ce7;">← 返回队列</div>
                <div class="review-entity">
                    <div class="review-entity-header">
                        <span class="review-entity-title">${escapeHtml(entity.entity_label || entity.entity_id)}</span>
                        <span class="review-entity-score">⭐ ${entity.importance_score || 0}</span>
                    </div>
                    <div class="review-entity-desc">${escapeHtml(entity.entity_description || '暂无描述')}</div>
                    <div style="margin-top: 8px;">
                        <div style="font-size:11px;color:#888;margin-bottom:4px;">前置依赖：</div>
                        ${(entity.prerequisites || []).map(p => `<span class="prereq-tag">${escapeHtml(p.label || '')}</span>`).join('') || '<span style="color:#666;font-size:11px;">无</span>'}
                    </div>
                    <div style="margin-top: 8px;">
                        <div style="font-size:11px;color:#888;margin-bottom:4px;">易混淆概念：</div>
                        ${(entity.siblings || []).map(s => `<span class="sibling-tag">${escapeHtml(s.label || '')}</span>`).join('') || '<span style="color:#666;font-size:11px;">无</span>'}
                    </div>
                    <div style="margin-top:12px;display:flex;gap:6px;">
                        <button onclick="showHistoryModal(${index})" style="padding:6px 12px;background:#252540;border:1px solid #333;border-radius:6px;color:#74b9ff;cursor:pointer;font-size:12px;">📜 历史</button>
                        <button onclick="keepReview(${index})" style="padding:6px 12px;background:#252540;border:1px solid #333;border-radius:6px;color:#00b894;cursor:pointer;font-size:12px;">✅ 保留</button>
                        <button onclick="discardReview(${index})" style="padding:6px 12px;background:#252540;border:1px solid #333;border-radius:6px;color:#e17055;cursor:pointer;font-size:12px;">❌ 丢弃</button>
                    </div>
                </div>
                <div style="font-size:13px;color:#888;margin-bottom:12px;">🎯 挑战问题（点击提交获取反馈）</div>
                ${questionsHtml}
            `;
        }

        async function submitDeepAnswer(entityIndex, questionIndex, question) {
            const answerEl = document.getElementById(`answer_${entityIndex}_${questionIndex}`);
            const feedbackEl = document.getElementById(`feedback_${entityIndex}_${questionIndex}`);
            const userAnswer = answerEl.value.trim();

            if (!userAnswer) {
                alert('请先输入你的理解');
                return;
            }

            feedbackEl.style.display = 'block';
            feedbackEl.innerHTML = '<div class="loading">分析中...</div>';

            const entity = currentDeepReviewSession[entityIndex];

            try {
                const res = await fetch(`${API_BASE}/deep-review/evaluate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        review_id: entity.id,
                        question_index: questionIndex,
                        answer: userAnswer
                    })
                });
                const data = await res.json();

                const score = data.score || 5;
                const scoreColor = score >= 7 ? '#00b894' : score >= 4 ? '#fdcb6e' : '#e17055';

                let feedbackHtml = `<div class="feedback-panel">`;

                // 1. 分数
                feedbackHtml += `<div class="feedback-score" style="color: ${scoreColor}; font-size: 20px; text-align: center; margin-bottom: 12px;">${score}/10</div>`;

                // 2. 建议（反馈项 + 总结）
                feedbackHtml += `<div style="margin-bottom: 12px;">`;
                if (Array.isArray(data.feedback) && data.feedback.length > 0) {
                    feedbackHtml += data.feedback.map(f => {
                        const item = (typeof f === 'object' && f !== null) ? f : {};
                        const typeLabel = item.type === 'gap' ? '逻辑断层' : item.type === 'misconception' ? '误解' : '表面化';
                        return `<div style="margin-bottom:8px;padding:8px;background:#252540;border-radius:4px;">
                            <span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;background:#74b9ff;color:#fff;margin-bottom:4px;">${escapeHtml(typeLabel)}</span>
                            <div style="font-size:12px;color:#ccc;line-height:1.5;">${escapeHtml(item.point || '（无内容）')}</div>
                            ${item.question ? `<div style="font-size:11px;color:#00b894;margin-top:4px;">💭 ${escapeHtml(item.question)}</div>` : ''}
                        </div>`;
                    }).join('');
                }
                if (data.summary) {
                    feedbackHtml += `<div style="margin-top:8px;font-size:12px;color:#888;line-height:1.5;padding:8px;background:#1e1e2e;border-radius:4px;">${escapeHtml(data.summary || '')}</div>`;
                }
                feedbackHtml += `</div>`;

                // 3. 参考答案
                if (data.answer_hint) {
                    feedbackHtml += `<div style="font-size:12px;color:#aaa;background:#1e1e2e;padding:10px;border-radius:4px;line-height:1.6;border-left:3px solid #6c5ce7;">
                        <strong>参考答案：</strong><br>${escapeHtml(data.answer_hint || '')}
                    </div>`;
                }

                feedbackHtml += `</div>`;
                feedbackEl.innerHTML = feedbackHtml;
            } catch (e) {
                console.error(e);
                feedbackEl.innerHTML = '<div class="loading">反馈获取失败</div>';
            }
        }

        let svgInstance, zoomInstance, currentTransformInstance;

        function focusNode(nodeId) {
            if (!window.graphData) return;
            const node = window.graphData.nodes.find(n => n.id === nodeId);
            if (!node) return;

            const container = document.getElementById('graphContainer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            const scale = 2;
            const x = width / 2 - node.x * scale;
            const y = height / 2 - node.y * scale;

            if (svgInstance && zoomInstance) {
                svgInstance.transition().duration(500).call(
                    zoomInstance.transform,
                    d3.zoomIdentity.translate(x, y).scale(scale)
                );
            }
        }

        init();
    </script>
</body>
</html>
